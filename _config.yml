# Minimal Mistakes Theme Settings
remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# Site Settings
locale: "ko-KR"
title: "dekmanfactory의 블로그"
title_separator: "-"
subtitle: "개발과 일상 이야기"
name: "dekmanfactory"
description: "dekmanfactory의 개발 블로그입니다."
url: "https://dekmanfactory.github.io"
baseurl: ""
repository: "dekmanfactory/dekmanfactory.github.io"
teaser: ""
logo: ""
masthead_title: ""
breadcrumbs: false
words_per_minute: 200
enable_copy_code_button: true
copyright: "dekmanfactory"
copyright_url: "https://dekmanfactory.github.io"

# Comments
comments:
  provider: false
  disqus:
    shortname: ""
  utterances:
    theme: "github-light"
    issue_term: "pathname"
  giscus:
    repo_id: ""
    category_name: ""
    category_id: ""
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "light"
    input_position: "bottom"
    emit_metadata: "0"
    lang: "ko"
    lazy: false

# Search
search: true
search_full_content: false

# Verification
google_site_verification: ""
bing_site_verification: ""
naver_site_verification: ""
yandex_site_verification: ""
baidu_site_verification: ""

# Social Sharing
twitter:
  username: ""
facebook:
  username: ""
og_image: ""

# Social Links
social:
  type: "Person"
  name: "dekmanfactory"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      # url: "mailto:your.email@example.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dekmanfactory"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      # url: "https://twitter.com/"

# Analytics
analytics:
  provider: "google"
  google:
    tracking_id: ""
    anonymize_ip: false

# Author
author:
  name: "dekmanfactory"
  avatar: ""
  bio: "개발과 일상을 기록합니다."
  location: ""
  email: ""
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dekmanfactory"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      # url: "mailto:your.email@example.com"

# Footer Links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dekmanfactory"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      # url: "mailto:your.email@example.com"

# Include/Exclude
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown Processing
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: "as_char"
  toc_levels: 1..6
  smart_quotes: "lsquo,rsquo,ldquo,rdquo"
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: "_sass"
  style: "compressed"

# Permalinks
permalink: "/:categories/:title/"
timezone: "Asia/Seoul"

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Archives
category_archive:
  type: "liquid"
  path: "/categories/"
tag_archive:
  type: "liquid"
  path: "/tags/"

# HTML Compression
compress_html:
  clippings: "all"
  ignore:
    envs: "development"

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Whitelist
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Navigation (메뉴 추가 예시)
navigation:
  main:
    - title: "Home"
      url: "/"
    - title: "About"
      url: "/about/"
    - title: "Archive"
      url: "/archive/"
