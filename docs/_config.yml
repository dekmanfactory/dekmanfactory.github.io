remote_theme             : "mmistakes/minimal-mistakes@master"

minimal_mistakes_skin    : "default"

# Site Settings
locale                   : "ko-KR"
title                    : "SQLD 학습 블로그"
title_separator          : "-"
subtitle                 : "150개 세트로 마스터하는 SQLD"
name                     : &name "Dekman"
description              : &description "SQLD 시험 대비 이론 요약과 실전 문제 풀이를 위한 블로그입니다."
url                      : "https://dekmanfactory.github.io"
baseurl                  : "" # 루트 도메인에 게시할 경우 빈 문자열

repository               : "dekmanfactory/dekmanfactory.github.io"
logo                     : "/assets/images/site-logo.png"
enable_copy_code_button  : true

# Comments (비활성화)
comments:
  provider: false

# Search
search                   : true
search_full_content      : true
search_provider          : lunr # GitHub Pages에서 algolia는 안 됨

# SEO
google_site_verification : "" # 필요 시 입력
naver_site_verification  : ""

# Social
twitter:
  username               : &twitter "dekmanfactory"
facebook:
  username               : &facebook ""
og_image                 : "/assets/images/site-logo.png"

social:
  type                   : "Organization"
  name                   : "DekmanFactory"
  links:
    - "https://github.com/dekmanfactory"

# Analytics (비활성화)
analytics:
  provider: false

# Author
author:
  name             : *name
  avatar           : "/assets/images/avatar.png"
  bio              : "SQLD 합격을 위한 전략적 콘텐츠 제공"
  location         : "Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dekmanfactory"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dekmanfactory"

# Collections (필요시 사용)
collections:
  posts:
    output: true
  content:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Markdown & Sass
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
sass:
  style: compressed

# Include/Exclude
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - tmp
  - log
  - .jekyll-cache
  - .sass-cache
  - .github

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Permalinks
permalink: /:categories/:title/
timezone: Asia/Seoul

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji
  - jekyll-include-cache

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji
  - jekyll-include-cache
